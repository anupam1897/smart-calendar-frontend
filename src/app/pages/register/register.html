<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-calendar-alt auth-icon"></i>
      <h1>Create Account</h1>
      <p>Join Smart Calendar</p>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-control" [(ngModel)]="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Role</label>
        <select class="form-control" [(ngModel)]="role" name="role">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Minimum 6 characters" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
      </div>

      <button type="submit" class="btn btn-primary auth-btn" [disabled]="loading">
        <i class="fas fa-user-plus" *ngIf="!loading"></i>
        <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
